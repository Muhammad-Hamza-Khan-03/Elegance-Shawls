services:
  mongo:
    image: mongo:8.0
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build: ./apps/backend
    restart: unless-stopped
    environment:
      MONGODB_URI: mongodb://mongo:27017
      MONGO_DB_NAME: ${MONGO_DB_NAME:-elegance_shawls}
      ALLOWED_ORIGINS: ${SITE_URL:?Set SITE_URL}
      ADMIN_API_KEY: ${ADMIN_API_KEY:?Set ADMIN_API_KEY}
      ENVIRONMENT: production
    depends_on:
      mongo:
        condition: service_healthy
    ports:
      - "127.0.0.1:8000:8000"

  frontend:
    build:
      context: ./apps/frontend
      args:
        NEXT_PUBLIC_API_URL: ${API_URL:?Set API_URL}
        NEXT_PUBLIC_SITE_URL: ${SITE_URL:?Set SITE_URL}
        NEXT_PUBLIC_WHATSAPP_NUMBER: ${WHATSAPP_NUMBER:?Set WHATSAPP_NUMBER}
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "127.0.0.1:3000:3000"

volumes:
  mongo_data:
