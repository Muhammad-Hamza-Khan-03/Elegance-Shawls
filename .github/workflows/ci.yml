name: CI
on:
  push:
    branches: [main]
  pull_request:
permissions:
  contents: read
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/frontend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm audit --audit-level=high
      - run: npm run build
        env:
          NEXT_PUBLIC_API_URL: https://api.example.invalid
          NEXT_PUBLIC_SITE_URL: https://store.example.invalid
          NEXT_PUBLIC_WHATSAPP_NUMBER: "923001234567"

  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/backend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/backend/requirements*.txt
      - run: pip install -r requirements-dev.txt pip-audit
      - run: pytest -q
        env:
          MONGODB_URI: mongodb://localhost:27017
          MONGO_DB_NAME: test
      - run: python -m compileall -q .
      - run: pip-audit -r requirements.txt

  e2e:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/frontend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/frontend/package-lock.json
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: apps/frontend/playwright-report
          retention-days: 7

  containers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: apps/backend
          push: false
          tags: elegance-backend:ci
      - uses: docker/build-push-action@v6
        with:
          context: apps/frontend
          push: false
          tags: elegance-frontend:ci
          build-args: |
            NEXT_PUBLIC_API_URL=https://api.example.invalid
            NEXT_PUBLIC_SITE_URL=https://store.example.invalid
            NEXT_PUBLIC_WHATSAPP_NUMBER=923001234567
